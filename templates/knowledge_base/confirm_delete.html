{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card card-modern p-4 text-center">
            <div class="rounded-circle bg-danger bg-opacity-10 text-danger mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 70px; height: 70px; font-size: 1.8rem;">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>
            <h4 class="fw-bold mb-2">Delete Document</h4>
            <p class="text-muted small mb-4">Are you sure you want to delete <strong>{{ document.title }}</strong>? This action will remove the document from the knowledge base and rebuild the AI vector store.</p>
            
            <form method="POST" action="">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger py-2.5 fw-semibold"><i class="bi bi-trash-fill me-1"></i> Yes, Delete Document</button>
                    <a href="{% url 'document-list' %}" class="btn btn-secondary-modern py-2.5 fw-semibold">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

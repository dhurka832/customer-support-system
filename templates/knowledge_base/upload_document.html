{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card card-modern p-4">
            <h3 class="fw-bold mb-1">Upload PDF Document</h3>
            <p class="text-muted small mb-4">Choose a PDF document to parse and index into the FAISS vector store database.</p>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_title" class="form-label small fw-semibold text-muted">Document Title</label>
                    <input type="text" name="title" maxlength="200" required id="id_title" class="form-control form-control-modern" placeholder="e.g. Employee Handbook 2026">
                </div>
                
                <div class="mb-4">
                    <label for="id_file" class="form-label small fw-semibold text-muted">PDF File</label>
                    <input type="file" name="file" required id="id_file" class="form-control form-control-modern" accept="application/pdf">
                </div>
                
                <div class="d-flex justify-content-between align-items-center">
                    <a href="{% url 'document-list' %}" class="btn btn-secondary-modern">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                    <button type="submit" class="btn btn-primary-modern px-4">
                        <i class="bi bi-cloud-arrow-up-fill"></i> Upload & Index
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

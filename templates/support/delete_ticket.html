{% extends "base.html" %}

{% block content %}
 <div class="card p-4">
   <h2>Delete Ticket</h2>
   <p>Are you sure you want to delete <strong>{{ticket.title}}</strong>?<p>
   <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger">Delete Ticket</button>
      <a href="{% url 'ticket-list' %}" class="btn btn-secondary">Cancel</a>
   </form>
 </div>
{% endblock %}
